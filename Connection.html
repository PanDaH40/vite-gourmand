<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Connexion - Vite & Gourmand</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="asset/CSS/Connection.css" />
  </head>

  <body>
    <header>
      <div class="container header-content">
        <h1 class="logo">Vite & Gourmand</h1>

        <nav>
          <a href="PagePrincipale.html">Accueil</a>
          <a href="Menu.html">Menus</a>
          <a href="Contact.html">Contact</a>
          <a href="Connection.html" class="active">Connexion</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="auth-card">
        <h2>Connexion</h2>
        <p class="muted">
          Accédez à votre espace pour commander et suivre vos commandes.
        </p>

        <form class="auth-form" action="php/Connection.php" method="post">
          <div class="form-group">
            <label for="email">Adresse mail</label>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="exemple@mail.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Votre mot de passe"
              required
            />
          </div>

          <p id="messageErreur" class="message-erreur"></p>

          <button type="submit" class="btn-primary">Se connecter</button>

          <div class="auth-links">
            <a href="ResetPassword.html">Mot de passe oublié ?</a>
            <span class="separator">•</span>
            <a href="Inscription.html">Créer un compte</a>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <div class="container footer-content">
        <div>
          <strong>Horaires</strong>
          <p>Lundi - Dimanche : 08h00 - 20h00</p>
        </div>

        <div>
          <a href="MentionLegale.html">Mentions légales</a> |
          <a href="CGV.html">CGV</a>
        </div>
      </div>
    </footer>

    <script src="asset/JS/Connection.js"></script>
  </body>
</html>
