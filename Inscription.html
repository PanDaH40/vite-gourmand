<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Inscription - Vite & Gourmand</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="asset/CSS/Inscription.css" />
  </head>

  <body>
    <header>
      <div class="container header-content">
        <h1 class="logo">Vite & Gourmand</h1>

        <nav>
          <a href="PagePrincipale.html">Accueil</a>
          <a href="Menu.html">Menus</a>
          <a href="Contact.html">Contact</a>
          <a href="Connection.html">Connexion</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="auth-card">
        <h2>Créer un compte</h2>
        <p class="muted">Les champs marqués * sont obligatoires.</p>

        <form class="auth-form" action="php/Inscription.php" method="post">
          <div class="grid-2">
            <div class="form-group">
              <label for="nom">Nom *</label>
              <input id="nom" type="text" name="nom" required />
            </div>

            <div class="form-group">
              <label for="prenom">Prénom *</label>
              <input id="prenom" type="text" name="prenom" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Adresse mail *</label>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="exemple@mail.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="telephone">Téléphone (GSM) *</label>
            <input
              id="telephone"
              type="tel"
              name="telephone"
              placeholder="06..."
              required
            />
          </div>

          <div class="form-group">
            <label for="adresse">Adresse postale *</label>
            <input id="adresse" type="text" name="adresse_postale" required />
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label for="ville">Ville *</label>
              <input id="ville" type="text" name="ville" required />
            </div>

            <div class="form-group">
              <label for="pays">Pays *</label>
              <input
                id="pays"
                type="text"
                name="pays"
                value="France"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Mot de passe *</label>
            <input
              id="password"
              type="password"
              name="password"
              minlength="10"
              required
            />
            <p class="muted small">
              Minimum 10 caractères : 1 majuscule, 1 minuscule, 1 chiffre, 1
              caractère spécial.
            </p>
          </div>

          <div class="form-group">
            <label for="password2">Confirmer le mot de passe *</label>
            <input
              id="password2"
              type="password"
              name="password2"
              minlength="10"
              required
            />
          </div>

          <p id="messageErreur" class="message-erreur"></p>
          <p id="messageSucces" class="message-succes"></p>

          <button type="submit" class="btn-primary">Créer mon compte</button>

          <div class="auth-links">
            Déjà un compte ?
            <a href="Connection.html">Se connecter</a>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <div class="container footer-content">
        <div>
          <strong>Horaires</strong>
          <p>Lundi - Dimanche : 08h00 - 20h00</p>
        </div>

        <div>
          <a href="MentionLegale.html">Mentions légales</a> |
          <a href="CGV.html">CGV</a>
        </div>
      </div>
    </footer>

    <script src="asset/JS/Inscription.js"></script>
    <script src="asset/JS/SessionFront.js"></script>
  </body>
</html>
